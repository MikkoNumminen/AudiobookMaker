name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_tmp
          mkdir -p dist/ffmpeg
          cp ffmpeg_tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/ffmpeg/ffmpeg.exe
        shell: bash

      - name: Create placeholder icon if missing
        run: |
          if [ ! -f assets/icon.ico ]; then
            pip install Pillow
            python -c "
          from PIL import Image
          img = Image.new('RGBA', (256, 256), (52, 101, 164, 255))
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])
          "
          fi
        shell: bash

      - name: Build exe with PyInstaller
        run: pyinstaller audiobookmaker.spec

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Update Inno Setup version from tag
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content installer/setup.iss) -replace 'AppVersion=1\.0\.0', "AppVersion=$version" -replace 'AudiobookMaker-Setup-1\.0\.0', "AudiobookMaker-Setup-$version" | Set-Content installer/setup.iss
        shell: pwsh

      - name: Build installer
        run: iscc installer/setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/Output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AudiobookMaker ${{ steps.version.outputs.VERSION }}
          body: |
            ## AudiobookMaker ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `AudiobookMaker-Setup-${{ steps.version.outputs.VERSION }}.exe` below
            2. Double-click and follow the installer
            3. Find AudiobookMaker in your Start Menu

            No Python, ffmpeg, or other dependencies needed — everything is included.
          files: installer/Output/*.exe
          draft: false
          prerelease: false
