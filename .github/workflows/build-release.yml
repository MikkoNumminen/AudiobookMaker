name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/test_record_voice_sample.py -x -q --tb=short

      - name: Download ffmpeg
        env:
          FFMPEG_RELEASE: autobuild-2026-04-12-13-04
          FFMPEG_ZIP: ffmpeg-n7.1.3-43-g5a1f107b4c-win64-gpl-7.1.zip
          FFMPEG_SHA256: e46e9075779735c2f0f83d6ffb6bfb7f908dafaf8ac4b7338849e2313a649934
          FFMPEG_DIR: ffmpeg-n7.1.3-43-g5a1f107b4c-win64-gpl-7.1
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_RELEASE}/${FFMPEG_ZIP}"
          echo "${FFMPEG_SHA256}  ffmpeg.zip" | sha256sum -c -
          7z x ffmpeg.zip -offmpeg_tmp
          mkdir -p dist/ffmpeg
          cp "ffmpeg_tmp/${FFMPEG_DIR}/bin/ffmpeg.exe" dist/ffmpeg/ffmpeg.exe
          cp "ffmpeg_tmp/${FFMPEG_DIR}/bin/ffplay.exe" dist/ffmpeg/ffplay.exe
          cp "ffmpeg_tmp/${FFMPEG_DIR}/bin/ffprobe.exe" dist/ffmpeg/ffprobe.exe
        shell: bash

      - name: Create placeholder icon if missing
        run: |
          if [ ! -f assets/icon.ico ]; then
            pip install Pillow
            python -c "
          from PIL import Image
          img = Image.new('RGBA', (256, 256), (52, 101, 164, 255))
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])
          "
          fi
        shell: bash

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Stamp version into source
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content src/auto_updater.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content src/auto_updater.py
        shell: pwsh

      - name: Build exe with PyInstaller
        run: pyinstaller audiobookmaker.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Update Inno Setup version from tag
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content installer/setup.iss) -replace 'AppVersion=\d+\.\d+\.\d+', "AppVersion=$version" -replace 'AudiobookMaker-Setup-\d+\.\d+\.\d+', "AudiobookMaker-Setup-$version" | Set-Content installer/setup.iss
        shell: pwsh

      - name: Build installer
        run: iscc installer/setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/Output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AudiobookMaker ${{ steps.version.outputs.VERSION }}
          body: |
            ## AudiobookMaker ${{ steps.version.outputs.VERSION }}

            Unified release — one app, one installer, all engines.

            ### What's new

            - Single unified GUI replaces both the old Main and Launcher installers
            - Finnish/English UI language toggle
            - PDF and plain text input modes
            - In-app engine installer (install Chatterbox without leaving the app)
            - Edge-TTS, Piper, and Chatterbox Finnish all in one window

            ### Installation

            1. Download `AudiobookMaker-Setup-${{ steps.version.outputs.VERSION }}.exe` below
            2. Double-click — click **More info** → **Run anyway** on the SmartScreen warning
            3. Follow the installer prompts
            4. Open AudiobookMaker from the Start Menu
            5. To add Chatterbox (best Finnish quality, needs NVIDIA GPU): click **Install engines** inside the app

            No Python or other dependencies needed — everything is bundled.
          files: installer/Output/*.exe
          draft: false
          prerelease: false

      - name: Update README version links
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          git pull origin master
          $version = "${{ steps.version.outputs.VERSION }}"
          $readme = Get-Content -Raw README.md
          $readme = $readme -replace 'AudiobookMaker v\d+\.\d+\.\d+', "AudiobookMaker v$version"
          $readme = $readme -replace 'releases/tag/v\d+\.\d+\.\d+', "releases/tag/v$version"
          $readme = $readme -replace 'AudiobookMaker-Setup-\d+\.\d+\.\d+\.exe', "AudiobookMaker-Setup-$version.exe"
          Set-Content README.md $readme
          git add README.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "docs(readme): update download links to v$version"
            git push origin master
          } else {
            Write-Host "README already up to date"
          }
          exit 0
        shell: pwsh
