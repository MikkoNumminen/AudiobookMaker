name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_tmp
          mkdir -p dist/ffmpeg
          cp ffmpeg_tmp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/ffmpeg/ffmpeg.exe
        shell: bash

      - name: Create placeholder icon if missing
        run: |
          if [ ! -f assets/icon.ico ]; then
            pip install Pillow
            python -c "
          from PIL import Image
          img = Image.new('RGBA', (256, 256), (52, 101, 164, 255))
          img.save('assets/icon.ico', format='ICO', sizes=[(256, 256)])
          "
          fi
        shell: bash

      - name: Stamp version into source
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content src/auto_updater.py) -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$version`"" | Set-Content src/auto_updater.py
        shell: pwsh

      - name: Build exe with PyInstaller
        run: pyinstaller audiobookmaker.spec

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Update Inno Setup version from tag
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          (Get-Content installer/setup.iss) -replace 'AppVersion=\d+\.\d+\.\d+', "AppVersion=$version" -replace 'AudiobookMaker-Setup-\d+\.\d+\.\d+', "AudiobookMaker-Setup-$version" | Set-Content installer/setup.iss
        shell: pwsh

      - name: Build installer
        run: iscc installer/setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/Output/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AudiobookMaker ${{ steps.version.outputs.VERSION }}
          body: |
            ## AudiobookMaker ${{ steps.version.outputs.VERSION }}

            Unified release — one app, one installer, all engines.

            ### What's new

            - Single unified GUI replaces both the old Main and Launcher installers
            - Finnish/English UI language toggle
            - PDF and plain text input modes
            - In-app engine installer (install Chatterbox without leaving the app)
            - Edge-TTS, Piper, and Chatterbox Finnish all in one window

            ### Installation

            1. Download `AudiobookMaker-Setup-${{ steps.version.outputs.VERSION }}.exe` below
            2. Double-click — click **More info** → **Run anyway** on the SmartScreen warning
            3. Follow the installer prompts
            4. Open AudiobookMaker from the Start Menu
            5. To add Chatterbox (best Finnish quality, needs NVIDIA GPU): click **Install engines** inside the app

            No Python or other dependencies needed — everything is bundled.
          files: installer/Output/*.exe
          draft: false
          prerelease: false

      - name: Update README version links
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s|AudiobookMaker v[0-9]\+\.[0-9]\+\.[0-9]\+|AudiobookMaker v${VERSION}|g" README.md
          sed -i "s|releases/tag/v[0-9]\+\.[0-9]\+\.[0-9]\+|releases/tag/v${VERSION}|g" README.md
          sed -i "s|AudiobookMaker-Setup-[0-9]\+\.[0-9]\+\.[0-9]\+\.exe|AudiobookMaker-Setup-${VERSION}.exe|g" README.md
          git add README.md
          git diff --cached --quiet || git commit -m "docs(readme): update download links to v${VERSION}"
          git push
        shell: bash
