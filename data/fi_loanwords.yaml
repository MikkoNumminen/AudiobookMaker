# Finnish loanword respelling lexicon for Chatterbox-Finnish TTS.
#
# Pass I in src/tts_engine.py::normalize_finnish_text loads this file
# via src/fi_loanwords.py. The four sections below each target a
# distinct failure class from docs/finnish_tts_failure_inventory.md.
#
# Stem whitelists (ismi_stems, tio_stems):
#   Each entry is the EXACT character sequence the regex
#   `\b(\w+?)(ismi|tio)(\w*)\b` will capture as group(1) — the
#   stem BEFORE the literal suffix. This is NOT the full surface
#   form and NOT a longer Finnish-inflected prefix.
#
#   Example: `humanismi` -> group(1) = `human`. Entry: `human`.
#   Example: `sanktio`   -> group(1) = `sank`.  Entry: `sank`.
#   Example: `instituutio` -> group(1) = `instituu`. Entry: `instituu`.
#
#   All stems here were audited by regex-capture simulation against
#   the failure inventory's surface forms. Every entry is known to
#   match at least one real Finnish loanword without false positives.
#
# CRITICAL: tio_stems must NOT contain `val`, `na`, `ra`, or any
# 2-letter stem that would false-positive on `valtio`, `nationalismi`,
# `rationalismi`, `rationaalinen` — native Finnish words where `tio`
# appears only as a coincidental substring.

