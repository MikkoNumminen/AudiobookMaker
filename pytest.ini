[pytest]
# Per-test timeout (seconds). Individual tests rarely need more than a
# second or two; 60 s catches runaway hangs in Tk cleanup, HTTP calls,
# or subprocess waits without slowing clean runs.
#
# Why thread method: signal-based timeouts don't work on Windows
# (signal.alarm is POSIX-only). Thread method works everywhere and is
# safe for our test suite (no tests spawn their own pytest).
timeout = 60
timeout_method = thread

# Custom markers. Keep registered here so --strict-markers doesn't trip
# on them.
#   network: test is allowed to open non-loopback sockets / call urlopen
#            (e.g. the Edge-TTS smoke suite that hits Microsoft's service).
#            Everything un-marked is blocked by the autouse guard in
#            tests/conftest.py to keep CI off the public internet.
#   gpu:     test requires CUDA / a real GPU to run. Reserved for future
#            Chatterbox / VoxCPM GPU-path coverage.
markers =
    network: test needs real outbound network access (opts out of the socket guard)
    gpu: test needs CUDA / a real GPU to run
    slow: test runs a real engine end-to-end (skipped by default in pre-commit)
