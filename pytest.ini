[pytest]
# Per-test timeout (seconds). Individual tests rarely need more than a
# second or two; 60 s catches runaway hangs in Tk cleanup, HTTP calls,
# or subprocess waits without slowing clean runs.
#
# Why thread method: signal-based timeouts don't work on Windows
# (signal.alarm is POSIX-only). Thread method works everywhere and is
# safe for our test suite (no tests spawn their own pytest).
timeout = 60
timeout_method = thread
